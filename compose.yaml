services:
  worker:
    build: .
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./reports:/app/reports
    environment:
      STATE_DB: /app/db/state.runtime.sqlite
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: phi3:mini
      OLLAMA_ENABLED: "true"
      OLLAMA_TIMEOUT: 45
      OLLAMA_NUM_PREDICT: 300
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m src.worker

  dashboard:
    build: .
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./reports:/app/reports
    environment:
      STATE_DB: /app/db/state.runtime.sqlite
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: phi3:mini
      OLLAMA_ENABLED: "true"
      OLLAMA_TIMEOUT: 45
      OLLAMA_NUM_PREDICT: 300
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8501:8501"
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
