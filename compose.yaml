services:
  analyzer:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./state:/app/state
    command: python worker.py

  dashboard:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./state:/app/state
    ports:
      - "8501:8501"
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
    